# Daily trade cycle in the cloud — PC no longer needs to be on.
# Two crons cover US daylight-saving shifts; the guard step keeps only the
# one that lands at 09:xx ET, so the cycle runs exactly once per market day.
name: daily-trade-cycle

on:
  schedule:
    - cron: "40 13 * * 1-5"   # 09:40 ET while US is on EDT (Mar-Nov)
    - cron: "40 14 * * 1-5"   # 09:40 ET while US is on EST (Nov-Mar)
  workflow_dispatch: {}        # manual run button for testing

concurrency:
  group: trade-cycle
  cancel-in-progress: false

permissions:
  contents: write              # to commit memory/ back

jobs:
  trade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Guard — run once per market day (delay-proof seasonal dedupe)
        # GitHub's cron fires hours late, so we must NOT gate on the execution
        # wall-clock hour (the old "must be 09 ET" check skipped every run).
        # Dedupe the two seasonal crons by which schedule fired vs. whether NY
        # is currently on EDT or EST — robust to arbitrary execution delay.
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            SEASON=$(TZ=America/New_York date +%Z)      # EDT (summer) or EST (winter)
            SCHED="${{ github.event.schedule }}"
            if { [ "$SEASON" = "EDT" ] && [ "$SCHED" != "40 13 * * 1-5" ]; } || \
               { [ "$SEASON" = "EST" ] && [ "$SCHED" != "40 14 * * 1-5" ]; }; then
              echo "SKIP=1" >> "$GITHUB_ENV"
              echo "Off-season duplicate cron ($SCHED during $SEASON); skipping."
            fi
          fi

      - uses: actions/setup-python@v5
        if: env.SKIP != '1'
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        if: env.SKIP != '1'
        run: pip install -r requirements.txt

      - name: Run trade cycle
        if: env.SKIP != '1'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          SYMBOLS: "SPY,QQQ,IWM,GLD,TLT"
        run: python run_trade_cycle.py

      - name: Persist memory (positions, outcomes, trade log)
        if: env.SKIP != '1'
        run: |
          git config user.name "trade-bot"
          git config user.email "trade-bot@users.noreply.github.com"
          git add memory
          git diff --cached --quiet || git commit -m "memory: cycle $(date -u +%Y-%m-%d)"
          git push
